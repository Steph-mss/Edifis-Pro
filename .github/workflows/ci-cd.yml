name: Pipeline CI/CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter les tests backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret
          JWT_EXPIRES_IN: 1h
          FRONTEND_URL: http://localhost:5174
          PORT: 5000

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/edifis-pro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/edifis-pro/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload artefact frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/edifis-pro/dist
          if-no-files-found: error

  deploy:
    name: Déploiement en Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger le build du Frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/edifis-pro/dist

      - name: Déploiement (à configurer)
        run: |
          echo "Déploiement de l'application..."
          echo "Backend: node server.js (pas de build step nécessaire)"
          echo "Frontend: dist/ prêt pour déploiement"
          echo "Configurer les secrets Azure/Render dans les settings GitHub."

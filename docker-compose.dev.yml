version: '3.9'

services:
  db:
    image: mariadb:10.11
    container_name: edifis_pro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_DOCK}
      MYSQL_DATABASE: ${DB_NAME_DOCK}
      MYSQL_USER: ${DB_USER_DOCK}
      MYSQL_PASSWORD: ${DB_PASSWORD_DOCK}
    ports:
      - '${DB_PORT_DOCK}:3306'
    volumes:
      - edifis_pro_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: edifis_pro_adminer
    restart: always
    ports:
      - '8081:8080'
    depends_on:
      - db

volumes:
  edifis_pro_data:
